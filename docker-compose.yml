version: "3.9"

services:
  db:
    image: postgres:15
    container_name: direct-ride-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: directride
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: DirectRide.Api/Dockerfile
    container_name: direct-ride-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=directride;Username=postgres;Password=password
    ports:
      - "8080:8080"

volumes:
  postgres_data: