name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore direct-ride-app.sln

      - name: Build
        run: dotnet build direct-ride-app.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test direct-ride-app.sln --configuration Release --no-build --verbosity normal
