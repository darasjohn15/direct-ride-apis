name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore direct-ride-app.sln

      - name: Build
        run: dotnet build direct-ride-app.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test direct-ride-app.sln --configuration Release --no-build --verbosity normal

  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate deployment configuration
        run: |
          test -n "$AWS_REGION"
          test -n "$ECR_REPOSITORY"
          test -n "$ECS_CLUSTER"
          test -n "$ECS_SERVICE"
          test -n "$ECS_CONTAINER_NAME"
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-and-push-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f DirectRide.Api/Dockerfile -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Create new ECS task definition revision
        id: task-def
        env:
          IMAGE_URI: ${{ steps.build-and-push-image.outputs.image }}
        run: |
          TASK_DEFINITION_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEFINITION_ARN" \
            --query taskDefinition > task-definition.json

          jq --arg image "$IMAGE_URI" --arg container "$ECS_CONTAINER_NAME" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | if any(.containerDefinitions[]; .name == $container) then . else error("Container not found in task definition: " + $container) end
            | .containerDefinitions |= map(
                if .name == $container then .image = $image else . end
              )
          ' task-definition.json > new-task-definition.json

          NEW_TASK_DEFINITION_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          echo "arn=$NEW_TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.task-def.outputs.arn }}"

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
